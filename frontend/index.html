<!DOCTYPE html>
<html>
    <head>
        <title>Tic Tac Toe Multiplayer</title>

        <link rel="stylesheet" href="homepage.css">
    </head>
    <body>
        <div id="home">
            <div id="Title">
                <h1 id="game-title">TIC TAC TOE</h1>
                <p id="subtitle">Play with your friends locally or online</p>
            </div>
            <div id="Image">
                <img src="Board Image.png" alt="Game board image">
            </div>
            <div id="Menu">
                <button id="local">Local Multiplayer</button>
                <button id="online">Online Multiplayer</button>
            </div>
        </div>
    </body>
</html>
