<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Online Multiplayer</title>
        <link rel="stylesheet" href="css/online.css"> 
    </head>
    <body>
        <div id="back">
            <button id="button-back">⬅ Back</button>
        </div>
        <div id="username">
            <button id="username-btn">Choose Name</button>
            <span id="username-display"></span>
            <div id="username-panel">
                <label for="username-input">Username:</label>

                <input type="text" id="username-input" maxlength="10" autocomplete="off">

                <p id="username-error">Username shouldn't be empty</p>
                <button id="save-username">Save</button>
            </div>
        </div>

        <div id="room-container">
            <h1 id="page-title">ONLINE MULTIPLAYER</h1>

            <button id="create-room-btn">Create Room</button>

            <div id="join-room">
                <p id="join-title">Join a Room</p>

                <input type="text" id="room-code-input" placeholder="Enter Room Code" maxlength="6" autocomplete="off">
                <p id="error-msg">Enter Correct Room Code</p>

                <button id="join-room-btn">Join Room</button>
            </div>
        </div>

        <script src="javascript/online.js"></script>
    
    </body>
</html>
