<!DOCTYPE html>
<html>
    <head>
        <title>Local Multiplayer | Tic Tac Toe</title>
        <link rel="stylesheet" href="onlinegame.css">
    </head>
    <body>
        <div id="back">
            <button id="button-back">⬅ Back</button>
        </div>
        <div id="game-container">
            <div id="scoreboard">
                <div id="X">
                    <p>X Wins</p>
                    <p id="x-score">0</p>
                </div>
                <div id="draw">
                    <p>Draws</p>
                    <p id="draw-score">0</p>
                </div>              
                <div id="O">
                    <p>O Wins</p>
                    <p id="o-score">0</p>
                </div>
            </div>
            <div id="turn-teller">
                <p>Player X's Turn</p>
            </div>
            <div id="board">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div id="overlay">
            <div id="result">
                <h2>X Wins! 🎉</h2>
                <p id="rematch-status"></p>
                <button id="rematch">Rematch</button>
                <button id="home">Back to Home</button>
            </div>
            </div>
        </div>

        <script src="onlinegame.js"></script>

    </body>
</html>
